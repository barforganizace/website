server {
    listen       80;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        autoindex on;
    }

    # Serve obchodni-podminky.md at /terms-and-conditions
    location = /terms-and-conditions {
        alias /usr/share/nginx/html/obchodni-podminky.md;
        default_type text/markdown;
    }

    # Serve zasady-ochrany-osobnich-udaju.md at /privacy
    location = /privacy {
        alias /usr/share/nginx/html/zasady-ochrany-osobnich-udaju.md;
        default_type text/markdown;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}